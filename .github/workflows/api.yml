name: API CI

on:
  push:
    paths:
      - "services/api-go/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "services/api-go/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/api-go/go.mod

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1

      - name: Build
        run: go build ./cmd/api
