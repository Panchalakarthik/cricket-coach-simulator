name: Admin Portal CI

on:
  push:
    paths:
      - "apps/admin-portal/**"
      - ".github/workflows/admin-portal.yml"
  pull_request:
    paths:
      - "apps/admin-portal/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin-portal/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
