version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cricket_coach}
      POSTGRES_USER: ${POSTGRES_USER:-cricket_coach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cricket_coach}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api-go
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8080:8080"

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"

  admin-portal:
    build:
      context: ./apps/admin-portal
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  postgres_data:
